name: 🐛 Bug Report
description: Report a bug to help us improve FinTrack
title: "[BUG] "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the information below to help us diagnose and fix the issue.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is
      placeholder: When I try to import a CSV file, the app crashes...
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Go to 'Transactions'
        2. Click on 'Import CSV'
        3. Select file 'test.csv'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen
      placeholder: The CSV should import successfully and show transactions
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened
      placeholder: The page shows an error message "Cannot read property of undefined"
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of the application is affected?
      options:
        - Dashboard
        - Transactions
        - Budget Manager
        - Subscriptions
        - Spending Analysis
        - Installments
        - Categories
        - User Settings
        - Authentication
        - API/Backend
        - Import/Export
        - Other
    validations:
      required: true

  - type: dropdown
    id: browsers
    attributes:
      label: Browser
      description: What browser are you seeing the problem on?
      multiple: true
      options:
        - Chrome
        - Firefox
        - Safari
        - Edge
        - Other
    validations:
      required: false

  - type: input
    id: version
    attributes:
      label: Application Version
      description: What version of FinTrack are you running?
      placeholder: e.g., 1.0.0 or commit hash

  - type: textarea
    id: logs
    attributes:
      label: Logs/Error Messages
      description: Please copy and paste any relevant log output or error messages
      render: shell

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain your problem

  - type: checkboxes
    id: checks
    attributes:
      label: Pre-submission Checks
      options:
        - label: I have searched existing issues to ensure this is not a duplicate
          required: true
        - label: I have provided clear steps to reproduce the issue
          required: true
        - label: I have tested on the latest version
          required: false
        - label: This is not a security vulnerability (see SECURITY.md for how to report those)
          required: true
